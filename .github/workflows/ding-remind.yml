# 方案B最终可用完整版（直接全量替换）
name: 钉钉打卡提醒
on:
  schedule:
    - cron: '40 0 * * 1-5' # UTC00:40=北京时间08:40 工作日
  workflow_dispatch:       # 手动点运行测试
jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: 发送钉钉提醒
        env:
          DING_WEBHOOK: ${{ secrets.DING_WEBHOOK }}
        run: |
          curl -X POST "$DING_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d '{
            "msgtype": "text",
            "text": {"content": "🔔 打卡提醒：现在 08:40，记得钉钉打卡！"}
          }'
