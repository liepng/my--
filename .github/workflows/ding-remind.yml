name: 钉钉打卡提醒

on:
  schedule:
    - cron: '40 0 * * 1-5'   # 北京时间 8:40（周一到周五）
  workflow_dispatch:          # 允许手动测试

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: 发送钉钉提醒
        env:
          DING_WEBHOOK: ${{ secrets.DING_WEBHOOK }}
        run: |
          curl -X POST "$DING_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d '{
            "msgtype": "text",
            "text": {"content": "🔔 打卡提醒：现在 8:40，准备钉钉打卡！"}
          }'
      - name: 记录日志
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S') 打卡提醒已发送" >> log.txt
